<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0B1220"/>
  <!-- Accent ring -->
  <circle cx="16" cy="16" r="14" stroke="url(#g)" stroke-width="1.5" fill="none"/>
  <!-- "YK" monogram -->
  <text x="4" y="22" font-family="system-ui, -apple-system, sans-serif"
        font-weight="700" font-size="14" fill="url(#g)" letter-spacing="-0.5">YK</text>
  <!-- AI neural dot accent -->
  <circle cx="24" cy="9" r="2.5" fill="#00E5FF" opacity="0.9"/>
  <circle cx="24" cy="9" r="1.2" fill="#7C4DFF"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
</svg>
